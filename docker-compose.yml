services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rolling
      POSTGRES_PASSWORD: rolling
      POSTGRES_DB: rolling10
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rolling -d rolling10"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_URL: postgresql+psycopg://rolling:rolling@db:5432/rolling10
      DATA_DIR: /app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
