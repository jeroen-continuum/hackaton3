services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rolling
      POSTGRES_PASSWORD: rolling
      POSTGRES_DB: rolling10
    ports:
      - "5434:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rolling -d rolling10"]
      interval: 5s
      retries: 10

volumes:
  pgdata_local:
