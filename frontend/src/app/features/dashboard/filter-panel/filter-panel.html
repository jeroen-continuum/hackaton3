<section class="filters">
  <div class="filter-section">
    <span class="section-label">Targeting</span>
    <div class="section-body">
      <div class="filter-group">
        <span class="label">Region</span>
        <div class="chips">
          @for (r of allRegions; track r) {
            <label class="chip">
              <input type="checkbox" [checked]="regions().includes(r)"
                     (change)="toggleRegion(r, $any($event.target).checked)" />
              {{ r }}
            </label>
          }
        </div>
      </div>

      <div class="filter-group">
        <span class="label">Sectors</span>
        <div class="chips">
          @for (s of sectors(); track s) {
            <label class="chip">
              <input type="checkbox" [checked]="selectedSectors().includes(s)"
                     (change)="toggleSector(s, $any($event.target).checked)" />
              {{ s.replace('_', ' ') }}
            </label>
          }
        </div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <span class="section-label">Size &amp; Financials</span>
    <div class="section-body">
      <div class="gated-row">
        <label class="chip">
          <input type="checkbox" [checked]="applySize()"
                 (change)="applySize.set($any($event.target).checked)" />
          Size filter
        </label>
        <div class="filter-group">
          <span class="label">Employees</span>
          <div class="range">
            <input type="number" min="0" [value]="minEmployees()"
                   (input)="minEmployees.set($any($event.target).valueAsNumber)" />
            <span>–</span>
            <input type="number" min="0" [value]="maxEmployees()"
                   (input)="maxEmployees.set($any($event.target).valueAsNumber)" />
          </div>
        </div>
      </div>

      <div class="gated-row">
        <label class="chip">
          <input type="checkbox" [checked]="applyFinancial()"
                 (change)="applyFinancial.set($any($event.target).checked)" />
          Financial filter
        </label>
        <div class="filter-group">
          <span class="label">EBITDA (€M)</span>
          <div class="range">
            <input type="number" min="0" step="0.1" [value]="minEbitdaM()"
                   (input)="minEbitda.set(($any($event.target).valueAsNumber || 0) * 1e6)" />
            <span>–</span>
            <input type="number" min="0" step="0.1" placeholder="no max"
                   [value]="maxEbitdaM()"
                   (input)="maxEbitda.set($any($event.target).valueAsNumber ? $any($event.target).valueAsNumber * 1e6 : null)" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <span class="section-label">Relationship</span>
    <div class="section-body toggles">
      <label class="chip">
        <input type="checkbox" [checked]="onlyWarm()"
               (change)="onlyWarm.set($any($event.target).checked)" />
        Only warm intros
      </label>
      <label class="chip">
        <input type="checkbox" [checked]="excludeClients()"
               (change)="excludeClients.set($any($event.target).checked)" />
        Exclude existing clients
      </label>
    </div>
  </div>

  <div class="actions">
    <button class="reset" (click)="reset()">Reset</button>
  </div>
</section>
